<!DOCTYPE HTML>
<html>
	<head>
		<title>Video Gallery | Gavia Gray</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			* { box-sizing: border-box; }

			.gallery-outer {
				max-width: 980px;
				margin: 1em auto;
				padding: 1em;
			}

			.gallery-header {
				text-align: center;
				margin-bottom: 1.5em;
				border-bottom: 2px solid rgba(255, 255, 255, 0.2);
				padding-bottom: 0.8em;
			}

			.gallery-header h1 {
				color: #fff;
				margin-bottom: 0.5em;
			}

			.gallery-header .back-link {
				color: rgba(255, 255, 255, 0.7);
				text-decoration: none;
				font-size: 0.9em;
			}

			.gallery-header .back-link:hover { color: #fff; }

			/* ── Video grid ── */
			.video-grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 1em;
			}

			@media (max-width: 600px) {
				.video-grid { grid-template-columns: 1fr; }
			}

			/* ── Individual video card ── */
			.video-card {
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 4px;
				display: flex;
				flex-direction: column;
			}

			.vc-title {
				padding: 0.4em 0.7em 0.15em;
				font-size: 0.8em;
				color: rgba(255, 255, 255, 0.7);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.vc-author {
				padding: 0 0.7em 0.4em;
				font-size: 0.75em;
				color: rgba(255, 255, 255, 0.4);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				border-bottom: 1px solid rgba(255, 255, 255, 0.08);
			}

			.vc-embed-area {
				position: relative;
				padding-bottom: 56.25%;
				height: 0;
				overflow: hidden;
				cursor: pointer;
				background: #000;
			}

			.vc-embed-area img.thumb {
				position: absolute;
				top: 0; left: 0;
				width: 100%; height: 100%;
				object-fit: cover;
				display: block;
			}

			.vc-embed-area iframe {
				position: absolute;
				top: 0; left: 0;
				width: 100%; height: 100%;
				border: none;
			}

			.vc-play-btn {
				position: absolute;
				top: 50%; left: 50%;
				transform: translate(-50%, -50%);
				background: rgba(0, 0, 0, 0.6);
				border: 2px solid rgba(255, 255, 255, 0.5);
				border-radius: 4px;
				color: #fff;
				width: 52px; height: 40px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 18px;
				pointer-events: none;
				transition: background 0.15s, border-color 0.15s;
			}

			.vc-embed-area:hover .vc-play-btn {
				background: rgba(0, 0, 0, 0.85);
				border-color: rgba(255, 255, 255, 0.9);
			}
		</style>
	</head>
	<body>

		<div class="gallery-outer">

			<div class="gallery-header">
				<h1>Video Gallery</h1>
				<a href="index.html" class="back-link">← Back to Home</a>
			</div>

			<div class="video-grid" id="videoGrid"></div>

		</div>

		<script>
			const videos = [
				"i7y4Ia4ZltU",
				"INdKA9JGhYE",
				"xsohkmkRk8o",
				"fBSiMe3_HGc",
				"6YsNRnZRgg8",
				"0g8VOHhwQAM",
				"BDB4b16Y5PA",
				"0AQdSZqGXz4",
				"Nt4KjJC23jo",
				"ujHgSf68VkY",
				"yr1nWcOjHFM",
				"FoX9dJfOrqE"
			];

			const titles = {};

			function loadTitle(videoId) {
				fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
					.then(r => r.json())
					.then(data => {
						titles[videoId] = data.title;
						const titleEl = document.getElementById(`title-${videoId}`);
						if (titleEl) titleEl.textContent = data.title;
						const authorEl = document.getElementById(`author-${videoId}`);
						if (authorEl) authorEl.textContent = data.author_name;
					})
					.catch(() => {});
			}

			function renderGrid() {
				const grid = document.getElementById('videoGrid');
				grid.innerHTML = videos.map((id, i) => `
					<div class="video-card">
						<div class="vc-title" id="title-${id}">Loading...</div>
						<div class="vc-author" id="author-${id}"></div>
						<div class="vc-embed-area" id="embed-${id}" onclick="playVideo('${id}', this)">
							<img class="thumb"
								src="https://img.youtube.com/vi/${id}/mqdefault.jpg"
								alt="Video ${i + 1}"
								onerror="this.src='https://img.youtube.com/vi/${id}/default.jpg'">
							<div class="vc-play-btn">▶</div>
						</div>
					</div>
				`).join('');
			}

			function playVideo(id, el) {
				el.innerHTML = `<iframe
					src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0"
					allowfullscreen
					allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
				</iframe>`;
				el.style.cursor = 'default';
				el.onclick = null;
			}

			renderGrid();
			videos.forEach(id => loadTitle(id));
		</script>

	</body>
</html>
